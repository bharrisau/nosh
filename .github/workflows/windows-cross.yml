name: Windows Cross-Compile Check (D-01)

# Automated gate for WIN-01: cargo check nosh-client for x86_64-pc-windows-gnu
# from a Linux host (no Windows toolchain / no WSL required on the dev machine).
#
# Ring requires gcc-mingw-w64-x86-64 even for `cargo check` because its build.rs
# compiles C source files unconditionally. This step installs it.
#
# cargo check does NOT link, so no MSVC runtime, no .exe output — this is purely
# a Rust type-check and Windows-API-availability gate.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows-cross-check:
    name: cargo check --target x86_64-pc-windows-gnu
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW cross-compiler
        # ring's build.rs compiles C code and requires x86_64-w64-mingw32-gcc
        # even for `cargo check` (no linking, but C compilation is unconditional
        # in ring's build script).
        #
        # Use the -posix threading variant: ring requires POSIX thread semantics.
        # The generic gcc-mingw-w64-x86-64 package installs versioned binaries
        # (e.g. x86_64-w64-mingw32-gcc-12) but the unversioned symlink may not
        # be configured via update-alternatives on all Ubuntu images.
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64-posix

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-windows-gnu-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo check nosh-client for Windows (D-01 gate)
        # Only check the client binary. nosh-auth IS checked transitively as a dep.
        # nosh-auth has #[cfg(unix)]-gated AgentSigner and a unix-conditional dep
        # (ssh-agent-client-rs); cargo check --target windows validates those gates.
        # nosh-server is excluded because it has no Windows-specific code or gates.
        #
        # CC_x86_64_pc_windows_gnu: tell the cc crate to use the explicit -posix
        # binary so it does not rely on update-alternatives symlink discovery,
        # which may not be configured on all Ubuntu runner images.
        run: cargo check -p nosh-client --target x86_64-pc-windows-gnu
        env:
          CC_x86_64_pc_windows_gnu: x86_64-w64-mingw32-gcc-posix
